name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (gate + integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: frontdesk
          POSTGRES_PASSWORD: frontdesk
          POSTGRES_DB: frontdesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U frontdesk"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.x"
      - name: Sync dependencies
        run: uv sync
      - name: Gate (format, lint, imports, types, unit tests)
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run lint-imports
          uv run mypy
          uv run pytest
      - name: Integration tests (real Postgres)
        run: uv run pytest tests/integration --no-cov

  dashboard:
    name: Dashboard (gate + e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/dashboard/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Gate (typecheck, lint, format, test, build)
        run: pnpm typecheck && pnpm lint && pnpm fmt:check && pnpm test && pnpm build
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: End-to-end tests
        run: pnpm e2e

  security:
    name: Security (dependency audit / SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.x"
      - name: Export locked Python deps
        working-directory: apps/api
        run: uv export --no-emit-project --format requirements-txt > requirements-audit.txt
      - name: Python dependency audit (pip-audit)
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: apps/api/requirements-audit.txt
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
      - name: Node dependency audit (fail on high/critical)
        run: |
          pnpm -C apps/dashboard audit --audit-level high
          pnpm -C apps/web audit --audit-level high
