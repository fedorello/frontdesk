# Frontdesk — local stack.
#
#   docker compose up -d                 → infrastructure only (Postgres + Redis)
#   docker compose --profile app up -d   → the whole product (api + worker + dashboard)
#
# App services read secrets from this directory's .env (gitignored); see .env.example.
# Explicit project name so it never collides with other repos' deploy/docker/.
name: frontdesk

x-api: &api
  build: ../../apps/api
  environment: &api-env
    FRONTDESK_DATABASE_URL: postgresql+asyncpg://frontdesk:frontdesk@postgres:5432/frontdesk
    FRONTDESK_REDIS_URL: redis://redis:6379/0
    FRONTDESK_LLM_PROVIDER: ${FRONTDESK_LLM_PROVIDER:-openai}
    FRONTDESK_LLM_API_KEY: ${FRONTDESK_LLM_API_KEY:-}
    FRONTDESK_LLM_MODEL: ${FRONTDESK_LLM_MODEL:-deepseek/deepseek-v4-flash}
    FRONTDESK_LLM_BASE_URL: ${FRONTDESK_LLM_BASE_URL:-https://openrouter.ai/api/v1}
    FRONTDESK_WHATSAPP_TOKEN: ${FRONTDESK_WHATSAPP_TOKEN:-}
    FRONTDESK_WHATSAPP_PHONE_NUMBER_ID: ${FRONTDESK_WHATSAPP_PHONE_NUMBER_ID:-}
    FRONTDESK_WHATSAPP_APP_SECRET: ${FRONTDESK_WHATSAPP_APP_SECRET:-}
    FRONTDESK_WHATSAPP_VERIFY_TOKEN: ${FRONTDESK_WHATSAPP_VERIFY_TOKEN:-}
    FRONTDESK_TELEGRAM_TOKEN: ${FRONTDESK_TELEGRAM_TOKEN:-}
    FRONTDESK_TELEGRAM_SECRET: ${FRONTDESK_TELEGRAM_SECRET:-}
    FRONTDESK_TELEGRAM_BOT_ADDRESS: ${FRONTDESK_TELEGRAM_BOT_ADDRESS:-}
    FRONTDESK_FIXED_NOW: ${FRONTDESK_FIXED_NOW:-}
    FRONTDESK_SECRET_KEY: ${FRONTDESK_SECRET_KEY:-}
    FRONTDESK_PUBLIC_URL: ${FRONTDESK_PUBLIC_URL:-}
    FRONTDESK_LOG_FILE: ${FRONTDESK_LOG_FILE:-}
    FRONTDESK_TELEGRAM_API_BASE: ${FRONTDESK_TELEGRAM_API_BASE:-}

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: frontdesk
      POSTGRES_PASSWORD: frontdesk
      POSTGRES_DB: frontdesk
    ports:
      - "5432:5432"
    volumes:
      # PostgreSQL 18+ expects the mount at /var/lib/postgresql (data goes in a
      # version subdirectory); mounting .../data makes the image exit on start.
      - frontdesk_pg:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frontdesk -d frontdesk"]
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

  migrate:
    <<: *api
    profiles: ["app"]
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    <<: *api
    profiles: ["app"]
    command: ["python", "scripts/seed.py"]
    depends_on:
      migrate:
        condition: service_completed_successfully

  api:
    <<: *api
    profiles: ["app"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully

  worker:
    <<: *api
    profiles: ["app"]
    command: ["python", "-m", "frontdesk.interface.run_worker"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  dashboard:
    build: ../../apps/dashboard
    profiles: ["app"]
    ports:
      - "3000:3000"

volumes:
  frontdesk_pg:
